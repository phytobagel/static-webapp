<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Static Web App</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <main class="shell">
      <p class="badge">Azure Static Web Apps</p>
      <h1>You’re deployed.</h1>
      <p class="lede">
        Replace this page with your app. Connect the repo in the Azure portal and
        push to <code>main</code> to ship updates automatically.
      </p>
      <ul class="meta">
        <li><span class="label">Config</span> <code>staticwebapp.config.json</code></li>
        <li><span class="label">Workflow</span> <code>.github/workflows/</code></li>
      </ul>
      <footer class="foot">
        <small>© <span id="year"></span></small>
      </footer>
    </main>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
